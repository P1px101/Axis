<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis</title>
    <link rel="icon" type="image/png" href="Icons/AXIS 32 nice.png">
    <link rel="stylesheet" href="WebsiteCode/style.css">
</head>
<body>

    <nav class="dock">
        <div class="logo">Axis</div>
        <div class="nav-links">
            <a href="#" class="nav-btn active">Home</a>
            <a href="#" class="nav-btn">Releases</a>
        </div>
    </nav>

    <!-- Gradient Overlay -->
    <div class="gradient-overlay"></div>

    <main class="content">
        <div id="model-container"></div>
        <div class="text-content">
            <h1 class="split-text" data-animation="chars">Welcome to Axis</h1>
            <p class="split-text" data-animation="words">Your next-generation platform</p>
        </div>
    </main>

    <!-- Scroll section -->
    <section class="scroll-section">
        <h2 class="split-text" data-animation="chars">Discover More</h2>
    </section>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- FBX Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <!-- Fflate -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.6.9/umd/index.min.js"></script>
    
    <!-- GSAP & ScrollTrigger (from CDN - no npm needed!) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <script src="WebsiteCode/script.js"></script>
</body>
</html>
