<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis</title>
    <link rel="icon" type="image/png" href="Icons/AXIS 32 nice.png">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="WebsiteCode/css/main.css">
    <link rel="stylesheet" href="WebsiteCode/css/dock.css">
    <link rel="stylesheet" href="WebsiteCode/css/3dmodel.css">
</head>
<body>

    <nav class="dock">
        <div class="logo">Axis</div>
        <div class="nav-links">
            <div class="nav-indicator"></div>
            <a href="#home" class="nav-btn active" data-section="home">Home</a>
            <a href="#releases" class="nav-btn" data-section="releases">Releases</a>
        </div>
    </nav>

    <!-- Gradient Overlay -->
    <div class="gradient-overlay"></div>

    <main id="home" class="content">
        <div id="model-container"></div>
        <div class="text-content">
            <h1 class="split-text" data-animation="chars">Welcome to Axis</h1>
            <p class="split-text" data-animation="words">Your next-generation platform</p>
        </div>
    </main>

    <!-- Scroll section -->
    <section id="releases" class="scroll-section">
        <h2 class="split-text" data-animation="chars">Releases</h2>
    </section>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.6.9/umd/index.min.js"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- JS Files -->
    <script src="WebsiteCode/js/main.js"></script>
    <script src="WebsiteCode/js/dock.js"></script>
    <script src="WebsiteCode/js/textanim.js"></script>
    <script src="WebsiteCode/js/3dmodel.js"></script>
</body>
</html>
